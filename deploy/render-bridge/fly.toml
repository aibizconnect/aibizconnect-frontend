# Fly.io config for the AIBizConnect render bridge (architect D-158).
# Deploy:  cd deploy/render-bridge && fly launch --no-deploy   (first time, pick a name/region)
#          fly secrets set RENDER_TOKEN=<long-random>          (shared secret)
#          fly deploy --dockerfile Dockerfile --build-context ../..
# Then in Vercel:  SITE_RENDER_URL=https://<app>.fly.dev   SITE_RENDER_TOKEN=<same token>

app = "aibizconnect-render-bridge"
primary_region = "yyz"  # Toronto — close to Ali/most CA tenants; change as needed

[build]
  dockerfile = "Dockerfile"

[env]
  RENDER_PORT = "8787"
  RENDER_USE_BUNDLED = "1"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "suspend"   # scale to zero when idle → cheap; wakes on request
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      method = "GET"
      path = "/healthz"
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # Chromium needs headroom; bump to 2gb if you see OOM on big pages
